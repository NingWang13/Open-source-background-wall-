name: wallhaven
description: 跨平台免费桌面壁纸 App，支持 Windows、macOS、iOS、Android、Web

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  
  # 路由
  go_router: ^14.1.4
  
  # 网络
  dio: ^5.4.3
  
  # 本地存储
  shared_preferences: ^2.2.3
  
  # 图片处理
  cached_network_image: ^3.3.5
  
  # 平台服务
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  
  # UI 组件
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  
  # 工具
  json_annotation: ^4.9.0
  logger: ^2.3.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  path: ^1.9.0
  
  # Windows 窗口管理
  window_manager: ^0.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
